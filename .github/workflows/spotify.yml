name: Update Spotify Recently Played

on:
  schedule:
    - cron: '0 * * * *' # Jalan tiap jam
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Spotify API & Update README
        env:
          CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          cat << 'EOF' > update_spotify.py
          import requests, os, re

          client_id = os.environ.get('CLIENT_ID')
          client_secret = os.environ.get('CLIENT_SECRET')
          refresh_token = os.environ.get('REFRESH_TOKEN')

          # 1. Dapatkan Access Token Baru
          res = requests.post('https://accounts.spotify.com/api/token', 
              data={'grant_type': 'refresh_token', 'refresh_token': refresh_token}, 
              auth=(client_id, client_secret))
          token = res.json().get('access_token')

          if not token:
              print("Gagal mendapatkan token! Cek kembali Client ID/Secret/Refresh Token.")
              exit(1)

          # 2. Ambil Data Recently Played
          headers = {'Authorization': f'Bearer {token}'}
          recent = requests.get('https://api.spotify.com/v1/me/player/recently-played?limit=5', headers=headers).json()

          # 3. Buat Format Tabel Markdown
          markdown = '<!-- spotify-recently-played-start -->\n'
          markdown += '<table>\n'
          for item in recent.get('items', []):
              track = item['track']
              name = track['name']
              artist = track['artists'][0]['name']
              url = track['external_urls']['spotify']
              # Ambil gambar album cover ukuran medium
              image = track['album']['images'][1]['url'] if track['album']['images'] else ''
              
              markdown += f'  <tr>\n'
              markdown += f'    <td><img src="{image}" width="60" height="60" style="border-radius:5px;"></td>\n'
              markdown += f'    <td><a href="{url}"><b>{name}</b></a><br/>{artist}</td>\n'
              markdown += f'  </tr>\n'
          markdown += '</table>\n'
          markdown += '<!-- spotify-recently-played-end -->'

          # 4. Tulis Ulang README.md
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          # Replace teks di antara tag dengan regex
          readme = re.sub(
              r'<!-- spotify-recently-played-start -->.*<!-- spotify-recently-played-end -->',
              markdown,
              readme,
              flags=re.DOTALL
          )

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(readme)
          EOF
          python update_spotify.py

      - name: Commit & Push Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          # Hanya commit jika ada perubahan lagu
          git commit -m '🎵 Update Spotify Recently Played' || exit 0
          git push
